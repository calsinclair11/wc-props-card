<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WC Props Card</title>
<style>
  :root {
    --bg: #0e1117; --panel: #171c26; --panel2: #1d2432;
    --text: #e6e9ef; --dim: #8b94a7; --line: #2a3245;
    --green: #3fd68f; --red: #ff6b6b; --amber: #ffb454; --blue: #6cb2ff;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         padding: 14px; max-width: 760px; margin-inline: auto; }
  h1 { font-size: 19px; margin: 0; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em;
       color: var(--dim); margin: 26px 0 10px; }
  .meta { color: var(--dim); font-size: 12.5px; margin-top: 3px; }
  .chip { display: inline-block; padding: 1px 8px; border-radius: 10px;
          font-size: 11.5px; font-weight: 600; vertical-align: 1px; }
  .chip.checkpoint { background: #24304a; color: var(--blue); }
  .chip.stale { background: #3a2530; color: var(--red); }
  .chip.fresh { background: #1d3a2d; color: var(--green); }

  .play { background: var(--panel); border: 1px solid var(--line);
          border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
  .play .top { display: flex; align-items: baseline; gap: 12px; }
  .edge-big { font-size: 30px; font-weight: 750; color: var(--green); min-width: 92px; }
  .who { font-weight: 650; font-size: 16px; }
  .what { color: var(--dim); font-size: 13px; }
  .case { margin-top: 7px; font-size: 14px; }
  .case.empty { color: var(--dim); font-style: italic; }
  .breakevens { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
  .be { font-size: 11.5px; background: var(--panel2); border-radius: 8px;
        padding: 2px 8px; color: var(--dim); }
  .be b { font-weight: 700; }
  .be b.pos { color: var(--green); } .be b.neg { color: var(--red); }
  .flagline { margin-top: 6px; font-size: 12px; color: var(--amber); }
  .status-tag { font-size: 11.5px; color: var(--amber); margin-top: 6px; }

  .exh { border: 1.5px dashed var(--amber); background: #1c1a14; }
  .exh .edge-big { color: var(--amber); }
  .exh-label { font-size: 10.5px; font-weight: 800; letter-spacing: .12em;
               color: var(--amber); text-transform: uppercase; }

  .veto { background: var(--panel); border-left: 3px solid var(--red);
          border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; font-size: 13.5px; }
  .veto .why { color: var(--red); font-size: 12.5px; }

  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th { text-align: left; color: var(--dim); font-weight: 600; padding: 5px 7px;
       border-bottom: 1px solid var(--line); white-space: nowrap; }
  td { padding: 6px 7px; border-bottom: 1px solid var(--line); vertical-align: top; }
  .tbl-wrap { overflow-x: auto; background: var(--panel); border-radius: 10px;
              border: 1px solid var(--line); padding: 4px 6px; }
  .win { color: var(--green); font-weight: 700; }
  .loss { color: var(--red); font-weight: 700; }
  .pending { color: var(--dim); font-style: italic; }

  .record { font-size: 13px; color: var(--dim); margin: 6px 2px 0; }
  .record b { color: var(--text); }

  .strip { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .bucket { background: var(--panel); border: 1px solid var(--line);
            border-radius: 12px; padding: 12px 14px; }
  .bucket .name { font-size: 12px; color: var(--dim); font-weight: 600; }
  .bucket .nums { font-size: 13px; margin-top: 6px; }
  .bar { height: 7px; border-radius: 4px; background: var(--panel2);
         margin-top: 5px; position: relative; overflow: hidden; }
  .bar .fill { position: absolute; inset: 0 auto 0 0; border-radius: 4px; }
  .bar .exp-mark { position: absolute; top: -2px; bottom: -2px; width: 2px;
                   background: var(--blue); }
  .empty-note { color: var(--dim); font-style: italic; font-size: 13.5px;
                background: var(--panel); border: 1px solid var(--line);
                border-radius: 10px; padding: 12px 14px; }
  #err { display: none; background: #3a2530; border-radius: 10px;
         padding: 12px 14px; font-size: 13.5px; margin-top: 14px; }
</style>
</head>
<body>
<header>
  <h1>WC Props Card <span id="checkpoint" class="chip checkpoint"></span>
      <span id="freshness" class="chip"></span></h1>
  <div class="meta" id="meta"></div>
</header>

<div id="err"></div>

<h2>Qualifying plays (≥ 60%)</h2>
<div id="plays"></div>

<h2>Shadow candidates on this card (57–59.9%)</h2>
<div id="shadow-card"></div>

<h2>Exhibition pick — one per match</h2>
<div id="exhibition"></div>
<div class="record" id="exh-record"></div>
<div class="tbl-wrap" id="exh-ledger-wrap" style="margin-top:8px"></div>

<h2>Vetoed candidates</h2>
<div id="vetoed"></div>

<h2>Shadow ledger</h2>
<div class="record" id="shadow-record"></div>
<div class="tbl-wrap" id="shadow-ledger-wrap" style="margin-top:8px"></div>

<h2>Calibration</h2>
<div class="strip" id="calibration"></div>
<div class="meta" style="margin-top:6px">Blue tick = implied (average devigged %). Bar = actual hit rate over settled rows (shadow + played). Judge on 30+ rows, not 5.</div>

<script>
"use strict";
const BREAKEVENS = [["2-leg power", 57.74], ["3-leg power", 58.48], ["3-leg flex", 59.09]];

const pct = x => (x * 100).toFixed(1) + "%";
const parsePct = s => parseFloat(String(s ?? "").replace("%", "")) || null;
const prettyStat = s => (s || "").replace(/_/g, " ")
  .replace(/\b\w/g, c => c.toUpperCase()).replace("Sot", "SOT");
const esc = s => String(s ?? "").replace(/[&<>"]/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function outcomeClass(v) {
  const t = String(v || "").trim().toLowerCase();
  if (["win", "won", "hit", "w"].includes(t)) return "win";
  if (["loss", "lost", "miss", "l"].includes(t)) return "loss";
  return "pending";
}
const isSettled = v => outcomeClass(v) !== "pending";

function playCard(p, { exhibition = false } = {}) {
  const prob = p.sharp_prob * 100;
  const bes = BREAKEVENS.map(([name, be]) => {
    const d = prob - be;
    return `<span class="be">${name} <b class="${d >= 0 ? "pos" : "neg"}">${d >= 0 ? "+" : ""}${d.toFixed(1)}</b></span>`;
  }).join("");
  const caseLine = p.case
    ? `<div class="case">${esc(p.case)}</div>`
    : `<div class="case empty">case pending — Layer 2–4 run not yet applied</div>`;
  const flags = (p.flags || []).length
    ? `<div class="flagline">⚠ ${esc(p.flags.join("; "))}</div>` : "";
  const status = p.play_status
    ? `<div class="status-tag">${esc(p.play_status)}</div>` : "";
  const label = exhibition ? `<div class="exh-label">Exhibition — below threshold · paper only</div>` : "";
  return `<div class="play ${exhibition ? "exh" : ""}">
    ${label}
    <div class="top">
      <div class="edge-big">${prob.toFixed(1)}%</div>
      <div>
        <div class="who">${esc(p.player)} · ${esc((p.side || "").toUpperCase())} ${esc(p.pp_line)}</div>
        <div class="what">${prettyStat(p.stat)} — ${esc(p.team)} vs ${esc(p.opponent)} · ${esc((p.books_used || []).join(", "))}</div>
      </div>
    </div>
    ${caseLine}
    <div class="breakevens">${bes}</div>
    ${flags}${status}
  </div>`;
}

function ledgerTable(rows, cols) {
  if (!rows.length) return `<div class="empty-note" style="border:0">no rows yet</div>`;
  const head = cols.map(([, label]) => `<th>${label}</th>`).join("");
  const body = rows.map(r => "<tr>" + cols.map(([key]) => {
    const v = r[key] ?? "";
    const cls = ["hypothetical_outcome", "result"].includes(key) ? outcomeClass(v) : "";
    return `<td class="${cls}">${esc(v)}</td>`;
  }).join("") + "</tr>").join("");
  return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
}

function record(rows, outcomeKey) {
  const settled = rows.filter(r => isSettled(r[outcomeKey]));
  const wins = settled.filter(r => outcomeClass(r[outcomeKey]) === "win").length;
  const implied = settled.length
    ? settled.reduce((s, r) => s + (parsePct(r.sharp) || 0), 0) / settled.length : null;
  return { n: rows.length, settled: settled.length, wins,
           hitRate: settled.length ? wins / settled.length * 100 : null, implied };
}

function bucketCard(name, rows, outcomeKey) {
  const r = record(rows, outcomeKey);
  const actual = r.hitRate, exp = r.implied;
  const nums = r.settled
    ? `expected <b>${exp.toFixed(1)}%</b> · actual <b>${actual.toFixed(1)}%</b> (${r.wins}–${r.settled - r.wins} of ${r.n})`
    : `${r.n} logged · none settled yet`;
  const fill = actual != null
    ? `<div class="fill" style="width:${Math.min(actual, 100)}%; background:${actual >= (exp ?? 0) ? "var(--green)" : "var(--red)"}"></div>` : "";
  const mark = exp != null ? `<div class="exp-mark" style="left:${Math.min(exp, 100)}%"></div>` : "";
  return `<div class="bucket"><div class="name">${name}</div>
    <div class="nums">${nums}</div><div class="bar">${fill}${mark}</div></div>`;
}

function recordLine(el, rows, outcomeKey, label) {
  const r = record(rows, outcomeKey);
  el.innerHTML = r.settled
    ? `${label}: <b>${r.wins}–${r.settled - r.wins}</b> settled (hit rate <b>${r.hitRate.toFixed(1)}%</b> vs implied <b>${r.implied.toFixed(1)}%</b>), ${r.n - r.settled} pending`
    : `${label}: ${r.n} logged, none settled yet`;
}

async function load() {
  let card, results;
  try {
    [card, results] = await Promise.all([
      fetch("data/card.json").then(r => { if (!r.ok) throw new Error("card.json " + r.status); return r.json(); }),
      fetch("data/results.json").then(r => { if (!r.ok) throw new Error("results.json " + r.status); return r.json(); }),
    ]);
  } catch (e) {
    const el = document.getElementById("err");
    el.style.display = "block";
    el.textContent = "Could not load data (" + e.message + "). If you opened this file directly, serve it instead: python3 -m http.server — then visit localhost:8000/dashboard.html";
    return;
  }

  document.getElementById("checkpoint").textContent = card.checkpoint;
  const gen = new Date(card.generated_at);
  const ageMin = Math.round((Date.now() - gen) / 60000);
  const fresh = document.getElementById("freshness");
  fresh.textContent = ageMin <= 60 ? ageMin + " min old" : "STALE — " + ageMin + " min";
  fresh.className = "chip " + (ageMin <= 60 ? "fresh" : "stale");
  document.getElementById("meta").textContent =
    "generated " + gen.toLocaleString() + " · thresholds: qualify ≥60%, shadow 57–59.9% · edge shown vs each entry-size breakeven";

  const plays = card.plays || [];
  document.getElementById("plays").innerHTML = plays.length
    ? plays.map(p => playCard(p)).join("")
    : `<div class="empty-note">No qualifying plays. Fewer than two qualifying legs = no entry — a pass is a valid output.</div>`;

  const shadow = card.shadow || [];
  document.getElementById("shadow-card").innerHTML = shadow.length
    ? shadow.map(p => playCard(p)).join("")
    : `<div class="empty-note">none on this card</div>`;

  const exh = card.exhibition || [];
  document.getElementById("exhibition").innerHTML = exh.length
    ? exh.map(p => playCard(p, { exhibition: true })).join("")
    : `<div class="empty-note">no exhibition picks on this card (needs a two-book SOT comparison)</div>`;

  document.getElementById("vetoed").innerHTML = (card.vetoed || []).length
    ? card.vetoed.map(v => `<div class="veto"><b>${esc(v.player)}</b> ${prettyStat(v.stat)} ${esc(v.pp_line)} — ${esc(v.team)} vs ${esc(v.opponent)}<div class="why">✕ ${esc(v.veto)}</div></div>`).join("")
    : `<div class="empty-note">nothing vetoed on this run</div>`;

  const shadowRows = results.shadow || [];
  recordLine(document.getElementById("shadow-record"), shadowRows, "hypothetical_outcome", "Shadow record");
  document.getElementById("shadow-ledger-wrap").innerHTML = ledgerTable(shadowRows, [
    ["date", "Date"], ["match", "Match"], ["player", "Player"], ["stat", "Stat"],
    ["line", "Line"], ["side", "Side"], ["sharp", "Sharp %"],
    ["hypothetical_outcome", "Hypothetical"], ["notes", "Notes"]]);

  const exhRows = results.exhibition || [];
  recordLine(document.getElementById("exh-record"), exhRows, "result", "Exhibition record (paper)");
  document.getElementById("exh-ledger-wrap").innerHTML = ledgerTable(exhRows, [
    ["date", "Date"], ["match", "Match"], ["player", "Player"], ["line", "Line"],
    ["side", "Side"], ["sharp", "Sharp %"], ["case_one_line", "Case"], ["result", "Result"]]);

  // Calibration buckets: shadow + played rows, split at 60% devigged.
  const calRows = [...shadowRows.map(r => ({ ...r, _o: r.hypothetical_outcome })),
                   ...(results.played || []).map(r => ({ ...r, _o: r.result }))];
  const lo = calRows.filter(r => { const p = parsePct(r.sharp); return p != null && p < 60; });
  const hi = calRows.filter(r => { const p = parsePct(r.sharp); return p != null && p >= 60; });
  document.getElementById("calibration").innerHTML =
    bucketCard("57–59.9% (shadow tier)", lo, "_o") + bucketCard("60%+ (playable tier)", hi, "_o");
}
load();
</script>
</body>
</html>
